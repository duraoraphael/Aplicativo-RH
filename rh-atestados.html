<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%235fbe4a'/%3E%3Cpath d='M14 34h36v8H14zM14 22h36v8H14z' fill='white'/%3E%3C/svg%3E" />
  <title>Painel RH - Atestados e Declarações</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-header">
    <div class="container header-content">
      <img src="assets/logo-normatel.png" alt="Normatel Engenharia" class="logo-normatel" />
    </div>
  </header>

  <main class="container main-content">
    <section class="page-head">
      <h1>Painel RH</h1>
      <p class="page-subtitle">Registros recebidos de atestados e declarações.</p>
    </section>

    <section class="card rh-list-card">
      <div class="rh-list-actions">
        <p id="listaStatus" class="rh-list-status status-message status-message--info status-toast">Carregando...</p>
        <div class="rh-list-btn-group">
          <button type="button" id="gerenciarUsuariosBtn" class="rh-admin-btn hidden" onclick="irParaAdmin()">Aprovar usuários</button>
          <button type="button" id="abrirDashboardDemandasBtn" class="rh-admin-btn" onclick="irParaDashboardDemandas()">Dashboard</button>
          <button type="button" id="sairRhBtn" class="rh-logout-btn" onclick="fazerLogout()">Sair</button>
        </div>
      </div>

      <div class="projetos-cards" aria-label="Projetos RH">
        <button type="button" class="projeto-card" data-projeto="736" onclick="abrirProjetoEmNovaAba('736')">
          <strong>Projeto 736</strong>
          <span>Base Imbetiba</span>
        </button>
        <button type="button" class="projeto-card" data-projeto="737" onclick="abrirProjetoEmNovaAba('737')">
          <strong>Projeto 737</strong>
          <span>Base Imboassica</span>
        </button>
        <button type="button" class="projeto-card" data-projeto="743" onclick="abrirProjetoEmNovaAba('743')">
          <strong>Projeto 743</strong>
          <span>Bases: Cabiunas, Severina e Barra do Furado</span>
        </button>
        <button type="button" class="projeto-card" data-projeto="741" onclick="abrirProjetoEmNovaAba('741')">
          <strong>Projeto 741</strong>
          <span>Bases: UTE, Áreas Externa e Tapera</span>
        </button>
        <button type="button" class="projeto-card" data-projeto="Apoio Macae" onclick="abrirProjetoEmNovaAba('Apoio Macae')">
          <strong>Apoio Macae</strong>
          <span>Base de apoio</span>
        </button>
      </div>

      <div id="tabelaWrapper" class="table-wrapper hidden">
        <table class="rh-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Função</th>
              <th>Projeto</th>
              <th>Tipo</th>
              <th>Início</th>
              <th>Fim</th>
              <th>Dias</th>
              <th>Enviado em</th>
              <th>Arquivo(s)</th>
            </tr>
          </thead>
          <tbody id="atestadosBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>

    async function registrarEventoBackend(acao, detalhes = {}) {
      if (typeof firebase !== 'undefined') {
        try {
          await firebase.firestore().collection('eventos_frontend').add({
            acao,
            pagina: 'rh-atestados.html',
            email: localStorage.getItem('rh_user_email') || '',
            usuarioId: localStorage.getItem('rh_user_id') || '',
            detalhes,
            criado_em: new Date().toISOString()
          });
        } catch {}
      }
    }

    registrarEventoBackend('acesso_pagina');

    // Funções globais para os botões - garantem funcionamento imediato
    function fazerLogout() {
      console.log('🔴 Logout iniciado');
      const emailAtual = localStorage.getItem('rh_user_email') || '';
      localStorage.removeItem('rh_auth_token');
      localStorage.removeItem('rh_user_id');
      localStorage.removeItem('rh_user_email');
      localStorage.removeItem('rh_user_nome');
      localStorage.removeItem('rh_user_pendente');
      registrarEventoBackend('logout', { email: emailAtual });
      console.log('✅ Dados limpos - redirecionando');
      window.location.href = 'index.html';
    }

    function irParaAdmin() {
      console.log('📋 Indo para admin');
      registrarEventoBackend('abrir_admin');
      window.location.href = 'rh-admin.html';
    }

    function irParaDashboardDemandas() {
      console.log('📊 Indo para dashboard de demandas');
      registrarEventoBackend('abrir_dashboard_demandas');
      window.location.href = 'rh-demandas.html';
    }

    function abrirProjetoEmNovaAba(codigoProjeto) {
      const destino = `rh-projeto.html?projeto=${encodeURIComponent(codigoProjeto)}`;
      registrarEventoBackend('abrir_projeto', { projeto: codigoProjeto });
      window.location.href = destino;
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="rh-dashboard.js?v=20260306i"></script>
</body>
</html>
