<html lang="pt-BR">

<body>
    <header class="top-header">
        <div class="container header-content">
            <img src="../assets/logo-normatel.png" alt="Normatel Engenharia" class="logo-normatel" />
        </div>
    </header>

    <main class="container main-content login-main">
        <section class="card login-card account-selector-card">
            <h1>Login RH</h1>
            <p class="page-subtitle">Entre com sua conta Microsoft para acessar os atestados e declarações.</p>

            <div class="account-button-group">
                <button id="loginBtn" class="microsoft-login-btn login-main-btn ms-auth-btn ms-auth-btn-primary" onclick="fazerLoginMicrosoft('login')">
                    <span class="ms-icon">
                        <span class="ms-sq ms-red"></span>
                        <span class="ms-sq ms-green"></span>
                        <span class="ms-sq ms-blue"></span>
                        <span class="ms-sq ms-yellow"></span>
                    </span>
                    <span>Entrar com Microsoft</span>
                </button>

                <p class="login-register-text">Não é cadastrado?</p>

                <button id="registerBtn" class="rh-access-btn login-main-btn ms-auth-btn ms-auth-btn-secondary" onclick="fazerLoginMicrosoft('cadastro')">
                    <span class="ms-icon">
                        <span class="ms-sq ms-red"></span>
                        <span class="ms-sq ms-green"></span>
                        <span class="ms-sq ms-blue"></span>
                        <span class="ms-sq ms-yellow"></span>
                    </span>
                    <span>Cadastrar com Microsoft</span>
                </button>

            <p id="statusMessage" class="status-message status-toast" role="status" aria-live="polite"></p>
            <div id="userInfo" class="account-user-info" style="display: none;">
                Usuário logado: <strong id="loggedUserName"></strong>
                <button id="logoutBtn" class="rh-logout-btn" onclick="sairConta()">Sair</button>
            </div>

            <a href="index.html" class="success-link login-back-link">Voltar para a página principal</a>
        </section>
    </main>

    <!-- MSAL.js - Microsoft Authentication Library (local para evitar bloqueio de Tracking Prevention) -->
    <script src="../assets/vendor/msal-browser.min.js"></script>

    <!-- Firebase Auth (compat) para cadastro direto no Authentication -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="../scripts/firebase-config.js?v=20260305a"></script>
    
    <!-- Configuração do MSAL -->
    <script src="../scripts/msal-config.js"></script>

    <!-- Script para gerenciar seleção de conta -->
    <script>
        if (window.location.hostname === '127.0.0.1') {
            const urlLocalhost = new URL(window.location.href);
            urlLocalhost.hostname = 'localhost';
            window.location.replace(urlLocalhost.toString());
        }

        // BANCO 100% ONLINE: Não há mais backend local
        // Todas as operações são feitas via Firebase Auth e Firestore
        function normalizarDestinoPosLogin(valor) {
            const bruto = String(valor || '').trim();
            if (!bruto) return 'rh-atestados.html';

            const semQueryHash = bruto.split('?')[0].split('#')[0].trim();
            const somenteArquivo = semQueryHash.split('/').pop() || '';
            if (/^[a-zA-Z0-9._-]+\.html$/.test(somenteArquivo)) {
                return somenteArquivo;
            }

            return 'rh-atestados.html';
        }

        const REDIRECT_AFTER_LOGIN = normalizarDestinoPosLogin(localStorage.getItem('rh_redirect_after_login'));
        localStorage.setItem('rh_redirect_after_login', REDIRECT_AFTER_LOGIN);
        const FIREBASE_PROJECT_HOST = localStorage.getItem('rh_firebase_project_host') || 'normatel-rh.firebaseapp.com';
        const FIREBASE_API_KEY = localStorage.getItem('rh_firebase_api_key') || 'AIzaSyCWLQteC_iYmUi_0DVEsUb5kCdki5e13bs';
        const DEFAULT_REMOTE_BACKEND_URL = '';
        function resolverBackendUrl() {
            const valorConfigurado = String(localStorage.getItem('rh_backend_url') || '').trim();

            if (valorConfigurado) {
                try {
                    const url = new URL(valorConfigurado);
                    const hostLocal = url.hostname === 'localhost' || url.hostname === '127.0.0.1';
                    if (!hostLocal && url.protocol === 'http:') {
                        url.protocol = 'https:';
                    }
                    return url.toString().replace(/\/+$/, '');
                } catch {
                    return valorConfigurado.replace(/\/+$/, '');
                }
            }

            const host = window.location.hostname;
            if (host === 'localhost' || host === '127.0.0.1') {
                return 'http://localhost:3001';
            }

            if (window.__RH_BACKEND_URL__) {
                return String(window.__RH_BACKEND_URL__).trim().replace(/\/+$/, '');
            }

            return DEFAULT_REMOTE_BACKEND_URL;
        }
        const BACKEND_URL = resolverBackendUrl();
        const FIREBASE_PENDING_REGISTER_KEY = 'rh_firebase_pending_register';
        const FIREBASE_PENDING_LOGIN_CHECK_KEY = 'rh_firebase_pending_login_check';
        const MSAL_PENDING_LOGIN_KEY = 'rh_msal_pending_login';
        const MSAL_PENDING_MODE_KEY = 'rh_msal_pending_mode';
        
        // Instância do MSAL (será inicializada quando MSAL.js carregar)
        let msalInstance = null;
        let msalReady = false;
        let firebaseAuthInstance = null;
        let statusMessageTimer = null;
        const AUTH_STEP_TIMEOUT_MS = 20000;
        
        function definirMensagem(texto, tipo = 'loading') {
            const el = document.getElementById('statusMessage');
            if (statusMessageTimer) {
                clearTimeout(statusMessageTimer);
                statusMessageTimer = null;
            }

            el.textContent = texto;
            el.className = 'status-message status-toast';
            if (tipo === 'success') {
                el.classList.add('status-message--success');
            } else if (tipo === 'error') {
                el.classList.add('status-message--error');
            } else {
                el.classList.add('status-message--info');
            }

            if (tipo === 'success' || tipo === 'info') {
                statusMessageTimer = setTimeout(() => {
                    el.textContent = '';
                    el.className = 'status-message status-toast';
                    statusMessageTimer = null;
                }, 4000);
            }
        }

        function limparMensagem() {
            const el = document.getElementById('statusMessage');
            if (statusMessageTimer) {
                clearTimeout(statusMessageTimer);
                statusMessageTimer = null;
            }
            el.textContent = '';
            el.className = 'status-message status-toast';
        }

        function definirBotoesAuthHabilitados(habilitado) {
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            if (loginBtn) loginBtn.disabled = !habilitado;
            if (registerBtn) registerBtn.disabled = !habilitado;
        }

        async function comTimeout(promise, etapa, timeoutMs = AUTH_STEP_TIMEOUT_MS) {
            let timerId;
            try {
                return await Promise.race([
                    promise,
                    new Promise((_, reject) => {
                        timerId = setTimeout(() => reject(new Error(`TIMEOUT_${etapa}`)), timeoutMs);
                    })
                ]);
            } finally {
                if (timerId) {
                    clearTimeout(timerId);
                }
            }
        }

        async function registrarEventoBackend(acao, detalhes = {}) {
            if (typeof firebase !== 'undefined') {
                try {
                    await firebase.firestore().collection('eventos_frontend').add({
                        acao,
                        pagina: 'account-selector.html',
                        email: localStorage.getItem('rh_user_email') || detalhes.email || '',
                        usuarioId: localStorage.getItem('rh_user_id') || detalhes.usuarioId || '',
                        detalhes,
                        criado_em: new Date().toISOString()
                    });
                } catch {}
            }
        }

        async function verificarSessaoExistente() {
            const token = localStorage.getItem('rh_auth_token');
            const email = localStorage.getItem('rh_user_email');
            const nome = localStorage.getItem('rh_user_nome');
            const pendente = localStorage.getItem('rh_user_pendente') === 'true';

            if (pendente) {
                definirMensagem('⏳ Seu cadastro está pendente de aprovação do administrador. Tente entrar novamente após a aprovação.', 'loading');
                document.getElementById('userInfo').style.display = 'none';
                return false;
            }

            if (token && email) {
                // Usuário já tem sessão ativa
                document.getElementById('loggedUserName').textContent = nome || email;
                document.getElementById('userInfo').style.display = 'block';
                return true;
            }
            return false;
        }


            // Fluxo principal é Firebase; backend é fallback para ambientes com regra/rede restritiva.


        async function verificarUsuarioCadastrado(email) {
            // Busca usuário no Firestore
            if (typeof firebase === 'undefined') throw new Error('Firebase não carregado');
            const snap = await firebase.firestore().collection('usuarios_rh').where('email', '==', email).get();
            if (snap.empty) return { existe: false, aprovado: false };
            const doc = snap.docs[0].data();
            const aprovadoPorStatus = String(doc.status || '').toLowerCase() === 'aprovado';
            const aprovadoPorFlag = doc.aprovado === true;
            return { existe: true, aprovado: aprovadoPorStatus || aprovadoPorFlag };
        }

        function erroPermissaoFirestore(erro) {
            const texto = `${erro?.code || ''} ${erro?.message || ''}`.toLowerCase();
            return texto.includes('permission-denied') || texto.includes('missing or insufficient permissions');
        }

        async function requisicaoBackendJson(url, options = {}, tentativas = 2) {
            if (!BACKEND_URL) {
                throw new Error('BACKEND_URL_NOT_CONFIGURED');
            }

            let ultimaResposta = null;

            for (let i = 0; i <= tentativas; i += 1) {
                let resposta;
                try {
                    resposta = await fetch(url, options);
                } catch {
                    if (i === tentativas) {
                        throw new Error('BACKEND_UNREACHABLE');
                    }
                    await new Promise((resolve) => setTimeout(resolve, 250 * (i + 1)));
                    continue;
                }

                ultimaResposta = resposta;
                if (resposta.ok) {
                    return await resposta.json();
                }

                const statusRepetivel = resposta.status === 429 || resposta.status >= 500;
                if (!statusRepetivel || i === tentativas) {
                    let detalhe = '';
                    try {
                        const body = await resposta.json();
                        detalhe = body?.error || body?.mensagem || '';
                    } catch {
                        detalhe = await resposta.text().catch(() => '');
                    }
                    throw new Error(`${resposta.status}${detalhe ? ` - ${detalhe}` : ''}`);
                }

                await new Promise((resolve) => setTimeout(resolve, 250 * (i + 1)));
            }

            throw new Error(`${ultimaResposta?.status || 'BACKEND_ERROR'}`);
        }

        async function verificarUsuarioCadastradoNoBackend(email) {
            const params = new URLSearchParams();
            params.set('email', String(email || '').trim().toLowerCase());
            const data = await requisicaoBackendJson(`${BACKEND_URL}/api/usuarios/existe?${params.toString()}`);
            return {
                existe: !!data?.existe,
                aprovado: !!data?.aprovado
            };
        }

        async function cadastrarUsuarioNoBackend(email, nome) {
            const data = await requisicaoBackendJson(`${BACKEND_URL}/api/usuarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: String(email || '').trim().toLowerCase(),
                    nome: String(nome || '').trim()
                })
            });

            return {
                status: data?.status === 'aprovado' ? 'aprovado' : 'pendente'
            };
        }

        function erroPopupBloqueado(erro) {
            const texto = `${erro?.code || ''} ${erro?.message || ''}`.toLowerCase();
            return (
                texto.includes('auth/popup-blocked') ||
                texto.includes('auth/popup-closed-by-user') ||
                texto.includes('auth/cancelled-popup-request') ||
                texto.includes('popup blocked') ||
                texto.includes('popup-closed-by-user')
            );
        }

        async function verificarUsuarioCadastradoComFallback(email) {
            try {
                return await verificarUsuarioCadastrado(email);
            } catch (erro) {
                if (!erroPermissaoFirestore(erro)) {
                    throw erro;
                }

                try {
                    return await verificarUsuarioCadastradoNoBackend(email);
                } catch (erroBackend) {
                    if (String(erroBackend?.message || '').includes('BACKEND_URL_NOT_CONFIGURED')) {
                        throw new Error('FIRESTORE_PERMISSION_DENIED_LOGIN_CHECK');
                    }
                    throw erroBackend;
                }
            }
        }

        async function processarRetornoConsultaFirebase() {
            if (sessionStorage.getItem(FIREBASE_PENDING_LOGIN_CHECK_KEY) !== '1') {
                return false;
            }
            sessionStorage.removeItem(FIREBASE_PENDING_LOGIN_CHECK_KEY);
            return false;
        }

        async function aplicarRestricaoCadastroParaAprovado(email) {
            const registerBtn = document.getElementById('registerBtn');
            if (!registerBtn || !email) {
                return;
            }

            const textoCadastro = registerBtn.querySelector('span:last-child');

            try {
                const verificacao = await verificarUsuarioCadastrado(String(email).toLowerCase());
                if (verificacao.existe && verificacao.aprovado) {
                    registerBtn.disabled = true;
                    registerBtn.classList.add('is-approval-locked');
                    registerBtn.title = 'Usuário já aprovado. Use Entrar com Microsoft.';
                    if (textoCadastro) {
                        textoCadastro.textContent = 'Cadastro bloqueado';
                    }
                    return;
                }

                registerBtn.classList.remove('is-approval-locked');
                registerBtn.title = '';
                if (textoCadastro) {
                    textoCadastro.textContent = 'Cadastrar com Microsoft';
                }
            } catch {
                // Mantém estado atual do botão em caso de falha na consulta.
            }
        }


        async function cadastrarUsuario(email, nome) {
            // Salva usuário no Firestore e, se faltar permissão, usa backend como fallback.
            if (typeof firebase === 'undefined') {
                return await cadastrarUsuarioNoBackend(email, nome);
            }

            try {
                const snap = await firebase.firestore().collection('usuarios_rh').where('email', '==', email).get();
                if (!snap.empty) {
                    const docRef = snap.docs[0].ref;
                    const docData = snap.docs[0].data() || {};
                    const statusAtual = String(docData.status || '').toLowerCase();
                    const aprovadoAtual = docData.aprovado === true || statusAtual === 'aprovado';

                    if (!aprovadoAtual) {
                        // Reenvia para fila de aprovação caso esteja pendente/rejeitado/inconsistente.
                        await docRef.set({
                            email,
                            nome,
                            status: 'pendente',
                            aprovado: false,
                            atualizado_em: new Date().toISOString()
                        }, { merge: true });
                        return { status: 'pendente' };
                    }

                    return { status: 'aprovado' };
                }
                await firebase.firestore().collection('usuarios_rh').add({
                    email,
                    nome,
                    status: 'pendente',
                    aprovado: false,
                    criado_em: new Date().toISOString()
                });
                return { status: 'pendente' };
            } catch (erro) {
                if (!erroPermissaoFirestore(erro)) {
                    throw erro;
                }

                return await cadastrarUsuarioNoBackend(email, nome);
            }
        }

        function marcarCadastroPendente(email, nome) {
            localStorage.removeItem('rh_auth_token');
            localStorage.removeItem('rh_user_id');
            localStorage.setItem('rh_user_email', email || '');
            localStorage.setItem('rh_user_nome', nome || email || '');
            localStorage.setItem('rh_user_pendente', 'true');
            document.getElementById('userInfo').style.display = 'none';
        }

        async function orientarLoginParaUsuarioJaAprovado(email, nome) {
            // Garante que o fluxo de cadastro não cria sessão de acesso RH.
            localStorage.removeItem('rh_auth_token');
            localStorage.removeItem('rh_user_id');
            localStorage.setItem('rh_user_email', email || '');
            localStorage.setItem('rh_user_nome', nome || email || '');
            localStorage.setItem('rh_user_pendente', 'false');

            try {
                const auth = await inicializarFirebaseAuth();
                await auth.signOut();
            } catch {
                // Se falhar logout do Firebase, mantém bloqueio local de sessão RH.
            }

            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) {
                loginBtn.disabled = false;
            }

            await aplicarRestricaoCadastroParaAprovado(email);
            definirMensagem('ℹ️ Cadastro já aprovado. Para acessar, clique em "Entrar com Microsoft".', 'info');
        }

        async function obterFirebaseConfigPublica() {
            // Reaproveita configuração já inicializada para evitar dependência de /__/firebase/init.json.
            try {
                if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0) {
                    const configApp = firebase.apps[0]?.options || {};
                    if (configApp.apiKey) {
                        return { apiKey: configApp.apiKey };
                    }
                }
            } catch {
                // Continua para os fallbacks abaixo.
            }

            if (FIREBASE_API_KEY) {
                return { apiKey: FIREBASE_API_KEY };
            }

            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                throw new Error('FIREBASE_API_KEY_MISSING');
            }

            const endpoint = `https://${FIREBASE_PROJECT_HOST}/__/firebase/init.json`;
            const resposta = await fetch(endpoint, { method: 'GET', mode: 'cors' });

            if (!resposta.ok) {
                throw new Error(`Não foi possível obter configuração pública do Firebase (${resposta.status}).`);
            }

            const config = await resposta.json();
            if (!config || !config.apiKey) {
                throw new Error('Configuração do Firebase inválida (apiKey ausente).');
            }

            return config;
        }

        async function inicializarFirebaseAuth() {
            if (firebaseAuthInstance) {
                return firebaseAuthInstance;
            }

            if (typeof firebase === 'undefined') {
                throw new Error('Firebase SDK não carregado.');
            }

            const configFirebase = await obterFirebaseConfigPublica();

            const firebaseConfig = {
                apiKey: configFirebase.apiKey,
                authDomain: FIREBASE_PROJECT_HOST,
                projectId: "normatel-rh" // Substitua pelo seu projectId real se necessário
            };

            if (!firebase.apps || firebase.apps.length === 0) {
                firebase.initializeApp(firebaseConfig);
            }

            firebaseAuthInstance = firebase.auth();
            return firebaseAuthInstance;
        }

        async function cadastrarNoFirebaseComPopup() {
            const auth = await inicializarFirebaseAuth();
            const provider = new firebase.auth.OAuthProvider('microsoft.com');
            provider.setCustomParameters({ prompt: 'select_account' });

            let resultado;
            try {
                resultado = await auth.signInWithPopup(provider);
            } catch (erroPopup) {
                const codigo = String(erroPopup?.code || '').toLowerCase();
                const mensagem = String(erroPopup?.message || '').toLowerCase();
                const erroPopupRelaciondo =
                    codigo.includes('auth/popup-closed-by-user') ||
                    codigo.includes('auth/popup-blocked') ||
                    codigo.includes('auth/cancelled-popup-request') ||
                    mensagem.includes('popup-closed-by-user') ||
                    mensagem.includes('popup blocked') ||
                    mensagem.includes('popup has been closed');

                if (erroPopupRelaciondo) {
                    throw new Error('FIREBASE_POPUP_BLOCKED_REGISTER');
                }
                throw erroPopup;
            }
            const user = resultado?.user;

            if (!user || !user.email) {
                throw new Error('Não foi possível obter usuário do Firebase após cadastro Microsoft.');
            }

            const token = await user.getIdToken();

            return {
                account: {
                    username: user.email,
                    name: user.displayName || user.email,
                    localAccountId: user.uid
                },
                token
            };
        }

        async function processarRetornoCadastroFirebase() {
            if (sessionStorage.getItem(FIREBASE_PENDING_REGISTER_KEY) !== '1') {
                return false;
            }
            sessionStorage.removeItem(FIREBASE_PENDING_REGISTER_KEY);
            return false;
        }

        async function registrarNoFirebaseAuth(loginResponse) {
            const configFirebase = await obterFirebaseConfigPublica();
            const accessToken = loginResponse?.accessToken || '';
            const idToken = loginResponse?.idToken || '';

            if (!accessToken && !idToken) {
                throw new Error('Token Microsoft ausente para sincronizar no Firebase.');
            }

            let postBody = `providerId=microsoft.com`;
            if (accessToken) {
                postBody += `&access_token=${encodeURIComponent(accessToken)}`;
            }
            if (idToken) {
                postBody += `&id_token=${encodeURIComponent(idToken)}`;
            }

            const resposta = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithIdp?key=${encodeURIComponent(configFirebase.apiKey)}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    requestUri: `https://${FIREBASE_PROJECT_HOST}/__/auth/handler`,
                    returnSecureToken: true,
                    returnIdpCredential: true,
                    postBody
                })
            });

            const dados = await resposta.json().catch(() => ({}));
            if (!resposta.ok) {
                const codigoErro = dados?.error?.message || 'UNKNOWN_FIREBASE_ERROR';
                throw new Error(`Falha ao registrar no Firebase Auth: ${codigoErro}`);
            }

            return dados;
        }

        function salvarSessao(account, token, origem = 'login') {
            localStorage.setItem('rh_auth_token', token);
            localStorage.setItem('rh_user_id', account.localAccountId);
            localStorage.setItem('rh_user_email', account.username);
            localStorage.setItem('rh_user_nome', account.name || account.username);
            localStorage.setItem('rh_user_pendente', 'false');

            registrarEventoBackend('sessao_salva', {
                origem,
                email: account.username,
                usuarioId: account.localAccountId,
                nome: account.name || account.username
            });

            document.getElementById('loggedUserName').textContent = account.name || account.username;
            document.getElementById('userInfo').style.display = 'block';
        }

        async function sairConta() {
            try {
                if (msalInstance) {
                    const contaAtual = msalInstance.getActiveAccount() || (msalInstance.getAllAccounts()[0] || null);
                    if (contaAtual) {
                        await msalInstance.logoutPopup({ account: contaAtual });
                    }
                }
            } catch (erroLogout) {
                console.warn('⚠️ Falha ao encerrar sessão Microsoft:', erroLogout);
            } finally {
                const emailAtual = localStorage.getItem('rh_user_email') || '';
                localStorage.removeItem('rh_auth_token');
                localStorage.removeItem('rh_user_id');
                localStorage.removeItem('rh_user_email');
                localStorage.removeItem('rh_user_nome');
                localStorage.removeItem('rh_user_pendente');

                registrarEventoBackend('logout', { email: emailAtual });

                document.getElementById('userInfo').style.display = 'none';
                definirMensagem('✅ Sessão encerrada com sucesso.', 'success');
            }
        }

        function deveUsarRedirectNoMsal(erro) {
            const texto = `${erro?.errorCode || ''} ${erro?.message || ''}`.toLowerCase();
            return (
                texto.includes('popup_window_error') ||
                texto.includes('empty_window_error') ||
                texto.includes('auth/popup-blocked') ||
                texto.includes('popup blocked') ||
                texto.includes('user cancelled')
            );
        }

        async function obterTokenValidoMsal(account, loginResponse = null) {
            if (!account) {
                return '';
            }

            const tokenDireto = loginResponse?.accessToken || loginResponse?.idToken || '';
            if (tokenDireto) {
                return tokenDireto;
            }

            if (!msalInstance || !msalReady) {
                return '';
            }

            try {
                const request = {
                    ...(window.tokenRequest || { scopes: ["openid", "profile", "email"] }),
                    account
                };
                const tokenResult = await comTimeout(msalInstance.acquireTokenSilent(request), 'MSAL_ACQUIRE_TOKEN', 12000);
                return tokenResult?.accessToken || tokenResult?.idToken || '';
            } catch {
                return '';
            }
        }

        async function processarRetornoLoginMicrosoft() {
            if (!msalInstance || !msalReady) {
                return false;
            }

            const loginResponse = await comTimeout(msalInstance.handleRedirectPromise(), 'MSAL_REDIRECT', 12000);
            const haviaLoginPendente = sessionStorage.getItem(MSAL_PENDING_LOGIN_KEY) === '1';
            const modoPendente = sessionStorage.getItem(MSAL_PENDING_MODE_KEY) || 'login';

            if (!loginResponse && !haviaLoginPendente) {
                return false;
            }

            sessionStorage.removeItem(MSAL_PENDING_LOGIN_KEY);
            sessionStorage.removeItem(MSAL_PENDING_MODE_KEY);

            const account = loginResponse?.account || msalInstance.getActiveAccount() || (msalInstance.getAllAccounts()[0] || null);
            if (!account) {
                if (haviaLoginPendente) {
                    definirMensagem('❌ Não foi possível concluir o retorno do login Microsoft. Tente novamente.', 'error');
                    definirBotoesAuthHabilitados(true);
                }
                return false;
            }

            const token = await obterTokenValidoMsal(account, loginResponse);
            const email = (account.username || '').toLowerCase();
            const nome = account.name || account.username;

            if (!email) {
                throw new Error('Não foi possível identificar o email da conta Microsoft após redirecionamento.');
            }

            if (modoPendente !== 'login') {
                return false;
            }

            if (!token) {
                definirMensagem('❌ Login Microsoft retornou sem token válido. Tente entrar novamente.', 'error');
                definirBotoesAuthHabilitados(true);
                return true;
            }

            const verificacao = await verificarUsuarioCadastradoComFallback(email);
            if (!verificacao.existe) {
                definirMensagem('⚠️ Primeiro acesso detectado. Clique em "Cadastrar com Microsoft" para continuar.', 'error');
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('registerBtn').disabled = false;
                return true;
            }

            if (!verificacao.aprovado) {
                marcarCadastroPendente(email, nome);
                definirMensagem('⏳ Seu cadastro ainda está pendente de aprovação do administrador.', 'loading');
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('registerBtn').disabled = false;
                return true;
            }

            if (msalInstance) {
                msalInstance.setActiveAccount(account);
            }

            definirMensagem(`✅ Login bem-sucedido como ${nome}`, 'success');
            salvarSessao(account, token, 'login_microsoft_redirect');

            setTimeout(() => {
                const destino = REDIRECT_AFTER_LOGIN;
                localStorage.removeItem('rh_redirect_after_login');
                window.location.href = destino;
            }, 1500);

            return true;
        }

        async function fazerLoginMicrosoft(modo = 'login') {
            let iniciouRedirecionamento = false;
            try {
                definirMensagem('🔄 Redirecionando para Microsoft...', 'loading');
                definirBotoesAuthHabilitados(false);

                if (modo === 'cadastro') {
                    const resultadoCadastroFirebase = await comTimeout(cadastrarNoFirebaseComPopup(), 'FIREBASE_POPUP_CADASTRO');
                    if (!resultadoCadastroFirebase) {
                        iniciouRedirecionamento = true;
                        return;
                    }
                    const account = resultadoCadastroFirebase.account;
                    const token = resultadoCadastroFirebase.token;
                    const email = (account.username || '').toLowerCase();
                    const nome = account.name || account.username;

                    const cadastro = await cadastrarUsuario(email, nome);

                    if (cadastro?.status === 'aprovado') {
                        await orientarLoginParaUsuarioJaAprovado(email, nome);
                        return;
                    }

                    marcarCadastroPendente(email, nome);
                    definirMensagem('⏳ Cadastro realizado com sucesso, mas está pendente de aprovação do administrador.', 'loading');
                    return;
                }

                if (!msalInstance || !msalReady) {
                    definirMensagem('❌ MSAL.js não carregou. Atualize a página.', 'error');
                    definirBotoesAuthHabilitados(true);
                    return;
                }

                const request = window.loginRequest || { scopes: ["openid", "profile", "email"] };
                let loginResponse;

                try {
                    loginResponse = await comTimeout(msalInstance.loginPopup(request), 'MSAL_POPUP_LOGIN');
                } catch (erroPopupMsal) {
                    if (deveUsarRedirectNoMsal(erroPopupMsal)) {
                        sessionStorage.setItem(MSAL_PENDING_LOGIN_KEY, '1');
                        sessionStorage.setItem(MSAL_PENDING_MODE_KEY, modo);
                        definirMensagem('🔄 Abrindo login por redirecionamento (popup bloqueado pelo navegador)...', 'loading');
                        iniciouRedirecionamento = true;
                        await msalInstance.loginRedirect(request);
                        return;
                    }
                    throw erroPopupMsal;
                }
                
                console.log('✅ Login bem-sucedido:', loginResponse);
                
                const account = loginResponse.account;
                const token = await obterTokenValidoMsal(account, loginResponse);
                const email = (account.username || '').toLowerCase();
                const nome = account.name || account.username;

                if (msalInstance) {
                    msalInstance.setActiveAccount(account);
                }

                if (!email) {
                    throw new Error('Não foi possível identificar o email da conta Microsoft.');
                }

                if (!token) {
                    throw new Error('MSAL_TOKEN_MISSING');
                }

                if (modo === 'login') {
                    const verificacao = await comTimeout(verificarUsuarioCadastradoComFallback(email), 'VERIFICACAO_USUARIO', 12000);
                    if (!verificacao.existe) {
                        definirMensagem('⚠️ Primeiro acesso detectado. Clique em "Cadastrar com Microsoft" para continuar.', 'error');
                        definirBotoesAuthHabilitados(true);
                        return;
                    }

                    if (!verificacao.aprovado) {
                        marcarCadastroPendente(email, nome);
                        definirMensagem('⏳ Seu cadastro ainda está pendente de aprovação do administrador.', 'loading');
                        definirBotoesAuthHabilitados(true);
                        return;
                    }

                    definirMensagem(`✅ Login bem-sucedido como ${nome}`, 'success');
                }
                
                salvarSessao(account, token, 'login_microsoft');

                setTimeout(() => {
                    const destino = REDIRECT_AFTER_LOGIN;
                    localStorage.removeItem('rh_redirect_after_login');
                    window.location.href = destino;
                }, 1500);
                iniciouRedirecionamento = true;
            } catch (error) {
                if (String(error?.message || '').includes('FIREBASE_REDIRECT_STARTED')) {
                    iniciouRedirecionamento = true;
                    return;
                }

                console.error('❌ Erro no login Microsoft:', error);

                let mensagemErro = `❌ Erro ao fazer login: ${error.message}`;
                const erroTexto = `${error.errorCode || ''} ${error.message || ''}`.toLowerCase();

                if (erroTexto.includes('aadsts50011')) {
                    mensagemErro = `❌ Redirect URI não cadastrada no Azure. Cadastre: ${window.location.origin}${window.location.pathname}`;
                } else if (erroTexto.includes('aadsts9002326')) {
                    mensagemErro = '❌ Azure bloqueou login cross-origin. No App Registration, adicione a plataforma SPA com URI http://localhost:5500/account-selector.html (não apenas Web).';
                } else if (erroTexto.includes('application') && erroTexto.includes('not found')) {
                    mensagemErro = '❌ App Registration não encontrado. Verifique Client ID e Tenant ID.';
                } else if (erroTexto.includes('invalid_client')) {
                    mensagemErro = '❌ Client ID inválido para este App Registration.';
                } else if (erroTexto.includes('firebase_api_key_missing')) {
                    mensagemErro = '❌ Falta configurar API key do Firebase no navegador: localStorage.setItem("rh_firebase_api_key","SUA_API_KEY") e recarregue.';
                } else if (erroTexto.includes('backend_url_not_configured')) {
                    mensagemErro = `❌ Backend não configurado para este domínio. Defina no navegador: localStorage.setItem("rh_backend_url","https://SUA-API") e recarregue.`;
                } else if (erroTexto.includes('backend_unreachable')) {
                    mensagemErro = `❌ Não foi possível conectar ao backend (${BACKEND_URL || 'não definido'}). Verifique se a API está publicada e com CORS liberado para ${window.location.origin}.`;
                } else if (erroTexto.includes('failed to fetch') || erroTexto.includes('cors')) {
                    mensagemErro = '❌ Firebase bloqueado por CORS. Configure a API key local com: localStorage.setItem("rh_firebase_api_key","SUA_API_KEY") e recarregue a página.';
                } else if (erroTexto.includes('missing or insufficient permissions') || erroTexto.includes('permission-denied')) {
                    mensagemErro = '❌ Sem permissão no Firestore para validar login/cadastro. Publique as regras com: firebase deploy --only firestore:rules';
                } else if (erroTexto.includes('invalid_credential_or_provider_id')) {
                    mensagemErro = '❌ Firebase rejeitou credencial Microsoft. Verifique se o provedor Microsoft no Firebase usa o mesmo Client ID/Secret do App Registration atual no Azure.';
                } else if (erroTexto.includes('unknown_firebase_error') || erroTexto.includes('operação não permitida') || erroTexto.includes('operation_not_allowed')) {
                    mensagemErro = '❌ Provedor Microsoft não está habilitado no Firebase Authentication.';
                } else if (erroTexto.includes('timeout_')) {
                    mensagemErro = '❌ O login demorou além do esperado e foi interrompido. Tente novamente; se persistir, limpe cache/cookies deste site.';
                } else if (erroTexto.includes('msal_token_missing')) {
                    mensagemErro = '❌ A Microsoft autenticou, mas não retornou token para sessão. Tente novamente e permita cookies/login pop-up.';
                } else if (erroTexto.includes('firestore_permission_denied_login_check')) {
                    mensagemErro = '❌ Login Microsoft concluído, mas o Firestore negou a leitura de usuarios_rh. Publique as regras no Firebase Console: Firestore Database > Rules > Publish.';
                } else if (erroTexto.includes('firebase_popup_blocked_register')) {
                    mensagemErro = '❌ O navegador bloqueou o popup de cadastro Firebase. Permita pop-ups para este site e tente novamente.';
                }

                definirMensagem(mensagemErro, 'error');
                definirBotoesAuthHabilitados(true);
            } finally {
                if (!iniciouRedirecionamento) {
                    definirBotoesAuthHabilitados(true);
                }
            }
        }

        // Verificar ao carregar página
        document.addEventListener('DOMContentLoaded', async () => {
            registrarEventoBackend('acesso_pagina');
            // Remove resíduos de fluxos antigos com redirect Firebase.
            sessionStorage.removeItem(FIREBASE_PENDING_LOGIN_CHECK_KEY);
            sessionStorage.removeItem(FIREBASE_PENDING_REGISTER_KEY);
            definirBotoesAuthHabilitados(false);


            // Não há mais backend, tudo é Firebase

            if (typeof firebase !== 'undefined') {
                document.getElementById('registerBtn').disabled = false;
            }

            try {
                // Inicializar MSAL.js se estiver carregado
                if (typeof msal !== 'undefined') {
                    msalInstance = new msal.PublicClientApplication(msalConfig);
                    await msalInstance.initialize();
                    msalReady = true;
                    console.log('✅ MSAL.js inicializado');
                    console.log('   Client ID:', msalConfig.auth.clientId);
                    console.log('   Tenant:', msalConfig.auth.authority);
                    console.log('   Redirect URI:', msalConfig.auth.redirectUri);

                    definirBotoesAuthHabilitados(true);
                    limparMensagem();

                    const processouRetornoMsal = await processarRetornoLoginMicrosoft();
                    if (processouRetornoMsal) {
                        return;
                    }
                } else {
                    console.warn('⚠️ MSAL.js não está carregado. Verifique o script local em assets/vendor/msal-browser.min.js');
                    document.getElementById('loginBtn').disabled = true;
                    if (typeof firebase === 'undefined') {
                        document.getElementById('registerBtn').disabled = true;
                        definirMensagem('⚠️ MSAL.js e Firebase não carregaram. Atualize a página.', 'error');
                    }
                }
            } catch (initError) {
                console.error('❌ Falha ao inicializar MSAL:', initError);
                definirMensagem(`❌ Falha ao iniciar login Microsoft: ${initError.message}`, 'error');
            }

            try {
                await processarRetornoConsultaFirebase();
            } catch (erroConsultaRedirect) {
                console.warn('⚠️ Falha ao processar retorno do Firebase para consulta:', erroConsultaRedirect);
            }

            try {
                const processouCadastroRedirect = await processarRetornoCadastroFirebase();
                if (processouCadastroRedirect) {
                    return;
                }
            } catch (erroRedirect) {
                console.error('❌ Falha no retorno de cadastro Firebase:', erroRedirect);
                definirMensagem(`❌ Erro ao concluir cadastro por redirecionamento: ${erroRedirect.message}`, 'error');
            }
            
            const temSessao = await verificarSessaoExistente();
            if (temSessao) {
                limparMensagem();
            }

            const emailAtual = localStorage.getItem('rh_user_email') || '';
            if (emailAtual) {
                await aplicarRestricaoCadastroParaAprovado(emailAtual);
            }

            if (typeof msal !== 'undefined' || typeof firebase !== 'undefined') {
                definirBotoesAuthHabilitados(true);
            }
        });
    </script>
