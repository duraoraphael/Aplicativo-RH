<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 Teste de API - RH Backend</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 20px; }
    .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-success { background: #4CAF50; color: white; }
    .btn-success:hover { background: #45a049; }
    .btn-primary { background: #2196F3; color: white; }
    .btn-primary:hover { background: #0b7dda; }
    .btn-danger { background: #f44336; color: white; }
    .btn-danger:hover { background: #da190b; }
    .response {
      background: #f5f5f5;
      border-left: 4px solid #4CAF50;
      padding: 15px;
      margin-top: 15px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .response.error { border-left-color: #f44336; color: #c62828; }
    .status { padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center; font-weight: bold; }
    .status.online { background: #c8e6c9; color: #2e7d32; }
    .status.offline { background: #ffcdd2; color: #c62828; }
    .status.testing { background: #fff9c4; color: #f57f17; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🧪 Teste de API - RH Backend</h1>
      <p>Clique nos botões abaixo para testar os endpoints da API</p>

      <div id="status" class="status testing">🔄 Verificando conexão...</div>

      <h2 style="margin-top: 20px; margin-bottom: 10px; font-size: 18px;">Testes de Endpoint</h2>
      <div class="button-group">
        <button class="btn-primary" onclick="testarSaude()">GET / (Status)</button>
        <button class="btn-primary" onclick="testarListarAtestados()">GET /api/envios</button>
        <button class="btn-success" onclick="testarCriarAtestado()">POST /api/envios</button>
        <button class="btn-primary" onclick="testarUsuariosPendentes()">GET /api/usuarios/pendentes</button>
        <button class="btn-danger" onclick="limparResultados()">Limpar</button>
      </div>

      <div id="resultado" class="response" style="display:none;"></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom: 15px;">📊 Logs de Requisição</h3>
      <div id="logs" style="background:#f5f5f5; padding:15px; border-radius:4px; font-family:monospace; font-size:12px; max-height:200px; overflow-y:auto;"></div>
    </div>
  </div>

  <script>
    const BASE_URL = 'http://localhost:3001';
    const statusDiv = document.getElementById('status');
    const resultadoDiv = document.getElementById('resultado');
    const logsDiv = document.getElementById('logs');

    function adicionarLog(mensagem) {
      const timestamp = new Date().toLocaleTimeString();
      logsDiv.innerHTML = `[${timestamp}] ${mensagem}\n` + logsDiv.innerHTML;
      if (logsDiv.innerHTML.split('\n').length > 20) {
        logsDiv.innerHTML = logsDiv.innerHTML.split('\n').slice(0, 20).join('\n');
      }
    }

    async function verificarConexao() {
      try {
        const response = await fetch(`${BASE_URL}/`);
        if (response.ok) {
          statusDiv.textContent = '✓ Backend online';
          statusDiv.className = 'status online';
          adicionarLog('✓ Conexão com backend estabelecida');
        }
      } catch (error) {
        statusDiv.textContent = '✗ Backend offline';
        statusDiv.className = 'status offline';
        adicionarLog('✗ Falha ao conectar ao backend');
      }
    }

    async function testarSaude() {
      adicionarLog('GET / - Testando saúde do servidor');
      try {
        const response = await fetch(`${BASE_URL}/`);
        const data = await response.json();
        exibirResultado(JSON.stringify(data, null, 2), false);
      } catch (error) {
        exibirResultado(`Erro: ${error.message}`, true);
      }
    }

    async function testarListarAtestados() {
      adicionarLog('GET /api/envios - Listando atestados');
      try {
        const response = await fetch(`${BASE_URL}/api/envios`);
        const data = await response.json();
        exibirResultado(`${data.length} atestado(s) encontrado(s):\n\n${JSON.stringify(data, null, 2)}`, false);
      } catch (error) {
        exibirResultado(`Erro: ${error.message}`, true);
      }
    }

    async function testarCriarAtestado() {
      adicionarLog('POST /api/envios - Criando novo atestado');
      try {
        const dados = {
          nome: 'João Silva (Teste)',
          funcao: 'Engenheiro',
          projeto: 'Projeto 736 - Base Imbetiba',
          tipo_atestado: 'Atestado médico',
          data_inicio: '2026-03-01',
          data_fim: '2026-03-05',
          dias: '5',
          horas_comparecimento: '8'
        };

        const response = await fetch(`${BASE_URL}/api/envios`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });
        const resultado = await response.json();
        exibirResultado(`Atestado criado com sucesso!\n\n${JSON.stringify(resultado, null, 2)}`, false);
      } catch (error) {
        exibirResultado(`Erro: ${error.message}`, true);
      }
    }

    async function testarUsuariosPendentes() {
      adicionarLog('GET /api/usuarios/pendentes - Listando usuários pendentes');
      try {
        const response = await fetch(`${BASE_URL}/api/usuarios/pendentes`);
        const data = await response.json();
        exibirResultado(`${data.length} usuário(s) pendente(s):\n\n${JSON.stringify(data, null, 2)}`, false);
      } catch (error) {
        exibirResultado(`Erro: ${error.message}`, true);
      }
    }

    function exibirResultado(texto, ehErro) {
      resultadoDiv.textContent = texto;
      resultadoDiv.style.display = 'block';
      resultadoDiv.className = ehErro ? 'response error' : 'response';
    }

    function limparResultados() {
      resultadoDiv.style.display = 'none';
      resultadoDiv.textContent = '';
    }

    // Verificar conexão ao carregar
    window.addEventListener('load', verificarConexao);

    // Verificação automática contínua removida para evitar atualização constante visual
  </script>
</body>
</html>
