<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Teste - Botão Sair</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { padding: 20px; }
    .teste { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    .ok { background: #4CAF50; color: white; }
    .erro { background: #f44336; color: white; }
  </style>
</head>
<body>
  <h1>🧪 Teste do Painel RH</h1>
  
  <div class="teste">
    <h3>1. Verificar localStorage</h3>
    <button class="ok" onclick="testarStorage()">Simular Login</button>
    <button class="erro" onclick="limparStorage()">Limpar Storage</button>
    <div id="resultStorage"></div>
  </div>

  <div class="teste">
    <h3>2. Ir para Painel RH</h3>
    <button class="ok" onclick="irParaPainel()">Abrir Painel RH</button>
  </div>

  <div class="teste">
    <h3>3. Console do Navegador</h3>
    <p>Abra o Console (F12) e veja as mensagens de debug ao clicar no botão Sair</p>
  </div>

  <script>
    function testarStorage() {
      const id = Date.now().toString();
      const email = `teste_${Date.now()}@normatel.com.br`;
      const nome = 'Usuário Teste';
      const token = 'test_' + Math.random().toString(36).substr(2, 9);

      localStorage.setItem('rh_auth_token', token);
      localStorage.setItem('rh_user_id', id);
      localStorage.setItem('rh_user_email', email);
      localStorage.setItem('rh_user_nome', nome);
      localStorage.setItem('rh_user_pendente', 'false');

      const result = document.getElementById('resultStorage');
      result.innerHTML = `✅ Dados armazenados:<br>Email: ${email}<br>Token: ${token.substring(0, 20)}...`;
    }

    function limparStorage() {
      localStorage.clear();
      const result = document.getElementById('resultStorage');
      result.innerHTML = `✅ localStorage limpo`;
    }

    function irParaPainel() {
      window.location.href = 'rh-atestados.html';
    }
  </script>
</body>
</html>
